# ProFTPD — configuración de referencia
# Fichero: /etc/proftpd/proftpd.conf (solo secciones relevantes)

ServerName   "Servidor FTP del IES Valle"
ServerType   standalone
DefaultServer on

# Puerto de control FTP
Port 21

# Rango de puertos para transferencia de datos en modo pasivo
# (Abrir también en el firewall: ufw allow 1024:1025/tcp)
PassivePorts 1024 1025

# Encerrar a cada usuario en su home (no puede subir al directorio raíz)
DefaultRoot ~

# Alternativa: redirigir todos los usuarios a un directorio concreto
# DefaultRoot /var/www/

# Permisos sobre el directorio compartido
<Directory /var/www/*>
    AllowOverwrite on
    <Limit ALL>
        AllowAll
    </Limit>
</Directory>

# Necesario para NAT: enmascara la IP real del servidor
# El cliente recibe 127.0.0.1 como IP de datos (engaño controlado)
# MasqueradeAddress 127.0.0.1

# Logging
TransferLog /var/log/proftpd/xferlog
SystemLog   /var/log/proftpd/proftpd.log
