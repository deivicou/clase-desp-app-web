# Apache como proxy inverso para Tomcat
#
# Activar módulos:
#   a2enmod proxy
#   a2enmod proxy_http

<VirtualHost *:801>

    # Redirige peticiones a Tomcat (HTTP)
    # Nota: usar la misma ruta en origen y destino evita problemas
    # con URLs absolutas dentro de la aplicación JSP
    ProxyPass        /examples http://localhost:8080/examples/jsp/
    ProxyPassReverse /examples http://localhost:8080/examples/jsp/


    # --- Para redirigir a HTTPS de Tomcat (descomentar si hace falta) ---
    # ProxyPass        / https://localhost:8443/
    # ProxyPassReverse / https://localhost:8443/
    # SSLProxyEngine On          # Habilita el proxy inverso SSL
    # SSLProxyVerify none        # No valida el certificado (autofirmado)
    # SSLProxyCheckPeerCN off    # No valida el CN del certificado
    # SSLProxyCheckPeerName off  # Complementa la anterior

</VirtualHost>
