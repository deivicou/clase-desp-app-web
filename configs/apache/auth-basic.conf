# Autenticación HTTP Basic — las credenciales viajan en texto plano
# Verificable con Wireshark en la interfaz de loopback
#
# Pasos previos:
#   apt-get install apache2-utils
#   htpasswd -c /etc/apache2/passwd usuario1   # -c solo la primera vez
#   htpasswd /etc/apache2/passwd usuario2
#   a2enmod auth_basic

<VirtualHost *:84>
    DocumentRoot /var/www/profesor

    <Directory /var/www/profesor>
        Options Indexes FollowSymLinks
        AllowOverride None
        AuthType Basic
        AuthName "Acceso restringido"
        AuthUserFile /etc/apache2/passwd
        Require valid-user
    </Directory>
</VirtualHost>
