# Autenticación HTTP Digest — contraseña hasheada (MD5), no viaja en texto plano
#
# Pasos previos:
#   a2ensite auth_digest
#   htdigest -c /etc/apache2/pass_dig grupo usuario   # -c solo la primera vez
#   htdigest /etc/apache2/pass_dig grupo usuario

<VirtualHost *:85>
    DocumentRoot /var/www/profesor_dig

    <Directory /var/www/profesor_dig>
        Options Indexes FollowSymLinks
        AllowOverride None
        AuthType Digest
        AuthName grupo                     # Debe coincidir con el grupo del htdigest
        AuthDigestProvider file
        AuthUserFile /etc/apache2/pass_dig
        Require valid-user
    </Directory>
</VirtualHost>
